#initilizing the extent report by setting the property "extent.reporter.spark.start" to true, which indicates that the Spark reporter should be used for generating the report. The output file for the report is specified as "Reports/NdosiWebsite.html" using the property "extent.reporter.spark.out".
extent.reporter.spark.start=true
extent.reporter.spark.out=Reports/Extent Report.html

#creating the folder "Screenshots" to store the screenshots taken during the test execution and setting the relative path for accessing the screenshots in the report.
screenshot.dir=Screenshots/
screenshot.rel.path=../Screenshots/

#Creating the base folder for the report with the name "test-output/SparkReport" and using the date pattern "d-MM-YY" for organizing the reports.
basefolder.name=test-output/SparkReport
basefolder.datetimepattern=d-MM-YY